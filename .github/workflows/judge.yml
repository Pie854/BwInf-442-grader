name: Judge Submission

on:
  issues:
    types: [opened]

jobs:
  judge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract attachment URL from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const match = body.match(/https:\/\/github\.com\/user-attachments\/files\/[^\s)]+/);
            if (!match) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "❌ **Fehler:** Kein ZIP-Anhang gefunden. Bitte lade eine `.zip`-Datei als Anhang hoch."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed",
                labels: ["invalid"]
              });
              core.setFailed("No attachment URL found in issue body.");
            } else {
              core.setOutput("url", match[0]);
              core.info("Found URL: " + match[0]);
            }

      - name: Download ZIP
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.extract.outputs.url }}" \
            -o submission.zip

      - name: Validate and extract ZIP
        id: validate_zip
        run: |
          if ! unzip -t submission.zip > /dev/null 2>&1; then
            echo "invalid=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          unzip -o submission.zip -d submission/
        continue-on-error: true

      - name: Report invalid ZIP and abort
        if: steps.validate_zip.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Fehler:** Die hochgeladene Datei ist kein gültiges ZIP-Archiv. Bitte stelle sicher, dass du eine `.zip`-Datei anhängst."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Submission von @${context.payload.issue.user.login} – verarbeitet.`,
              state: "closed"
            });
            core.setFailed("Aborting: invalid ZIP.");

      - name: Run judge
        id: judge
        env:
          SUBMITTER: ${{ github.event.issue.user.login }}
        run: |
          python evaluator/judge.py \
            --submission-dir submission/ \
            --instances-dir data/instances/ \
            --leaderboard data/leaderboard.json \
            --submitter "$SUBMITTER" \
            --result-file result.json

      - name: Post result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let body;
            try {
              const result = JSON.parse(fs.readFileSync("result.json", "utf8"));
              if (result.status === "ok") {
                let table = "| Testfall | Deine Kosten | Beste Kosten | Punkte |\n|---|---|---|---|\n";
                for (const tc of result.testcases) {
                  const statusIcon = tc.valid ? "✅" : "❌";
                  table += `| ${statusIcon} ${tc.id} | ${tc.cost ?? "—"} | ${tc.best_cost ?? "—"} | ${tc.points?.toFixed(2) ?? "0.00"} |\n`;
                }
                body = `## ✅ Submission von @${result.submitter} ausgewertet\n\n` +
                       `**Gesamtpunktzahl: ${result.total_score.toFixed(2)} / ${result.max_score}.00**\n\n` +
                       table +
                       `\n> Nur gültige Testfälle fließen in die Wertung ein. ` +
                       `Ungültige Testfälle (❌) geben 0 Punkte.`;
              } else {
                body = `## ❌ Fehler bei der Auswertung\n\n\`\`\`\n${result.error}\n\`\`\``;
              }
            } catch (e) {
              body = "❌ **Interner Fehler:** Ergebnis konnte nicht gelesen werden.";
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Commit leaderboard
        if: steps.judge.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git diff --cached --quiet || git commit -m "leaderboard: update for ${{ github.event.issue.user.login }} (#${{ github.event.issue.number }})"
          git push

      - name: Redact issue body and close
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Submission von @${context.payload.issue.user.login} – verarbeitet.`,
              state: "closed"
            });