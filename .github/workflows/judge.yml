name: Judge Submission

on:
  issues:
    types: [opened]

jobs:
  judge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Save issue body
        run: |
          echo "${{ github.event.issue.body }}" > issue.txt
      
      - name: Extract attachment URL
        id: extract
        run: |
          python - <<EOF
          import re

          text = open("issue.txt").read()

          m = re.search(
              r'https://github\.com/user-attachments/files/\S+',
              text
          )

          if not m:
              raise Exception("No attachment URL found")

          url = m.group(0)

          print("Found URL:", url)

          with open("url.txt", "w") as f:
              f.write(url)
          EOF

      - name: Download ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(cat url.txt)

          curl -L \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$url" \
            -o submission.zip

      - name: Verify ZIP
        run: |
          file submission.zip
          unzip -t submission.zip

      - name: Save username
        run: |
          echo "${{ github.event.issue.user.login }}" > username.txt

      - name: Run judge
        run: |
          python evaluator/judge.py

      - name: Commit leaderboard
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/leaderboard.json

          git commit -m "Update leaderboard" || exit 0

          git push

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Submission evaluated successfully."
            })

      - name: Hide attachment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Submission processed."
            })

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            })