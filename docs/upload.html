<input type="text" id="username" placeholder="Name">
<br><br>

<input type="file" id="file">
<br><br>

<button onclick="upload()">Upload</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
console.log("SCRIPT LOADED");
const sb = window.supabase.createClient(
  "https://edgozmdoqfpisaqlcowp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkZ296bWRvcWZwaXNhcWxjb3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTI2NDcsImV4cCI6MjA5NjMyODY0N30.npwKrfYKRzQnl8-O4kh05BpPUZtwMYUUTV0DbnDMyi0"
);

async function upload() {

  const file = document.getElementById("file").files[0];
  const username = document.getElementById("username").value;

  if (!file || !username) {
    alert("Bitte alles ausfüllen");
    return;
  }

  const filename =
    username + "_" + Date.now() + "_" + file.name;

  // Datei hochladen
  const result = await sb.storage
    .from("submissions")
    .upload(filename, file);

  if (result.error) {
    alert(result.error.message);
    return;
  }

    // In DB eintragen
  const insertResult = await sb
    .from("submissions")
    .insert({
      username: username,
      filename: filename,
      processed: false
    });

  console.log(insertResult);

  if (insertResult.error) {
    alert(insertResult.error.message);
    return;
  }

  alert("Upload erfolgreich!");
}
</script>

</body>
